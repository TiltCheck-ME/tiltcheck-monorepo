name: Deploy Services to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'modules/**'
      - '.github/workflows/deploy-railway.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Architecture: GitHub Actions builds images and pushes to GHCR with repo-root
# build context (context: .). Railway services must be configured in the Railway
# dashboard to use "Docker Image" source pointing to the GHCR image for each
# service (ghcr.io/tiltcheck-me/tiltcheck-<service>:latest). Once configured,
# the redeploy step below triggers Railway to pull the new image and deploy.
#
# DO NOT use "railway up" here — it triggers Railway's own builder which uses
# the service subdirectory as build context and cannot find root-level monorepo
# files (pnpm-lock.yaml, pnpm-workspace.yaml, etc.).

jobs:
  build-and-push:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - web
          - discord-bot
          - trust-rollup
          - control-room
          - game-arena
          - user-dashboard
          - activity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/tiltcheck-${{ matrix.service }}:latest

  deploy:
    name: Trigger Railway Redeploy
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - web
          - discord-bot
          - trust-rollup
          - control-room
          - game-arena
          - user-dashboard
          - activity
    steps:
      - name: Redeploy ${{ matrix.service }} on Railway
        run: |
          npx @railway/cli@latest redeploy \
            --service "${{ matrix.service }}" \
            --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: e48fdf5a-7857-4c69-a578-1ce8fa10d93e
