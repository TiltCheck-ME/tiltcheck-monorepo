name: Deploy Services to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'modules/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - web
          - discord-bot
          - trust-rollup
          - control-room
          - game-arena
          - user-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/tiltcheck-${{ matrix.service }}:latest

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - web
          - discord-bot
          - trust-rollup
          - control-room
          - game-arena
          - user-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy ${{ matrix.service }} to Railway
        run: npx @railway/cli@latest up --service ${{ matrix.service }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
