name: Validate Changed Packages (PR)

on:
  pull_request:
    branches:
      - main

jobs:
  validate-changed:
    runs-on: ubuntu-latest
    name: Validate Changed Packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce no passWithNoTests scripts
        run: node scripts/check-no-pass-with-no-tests.mjs

      - name: Build changed packages
        run: pnpm --filter="[origin/main]..." --filter="!." build

      - name: Run tests on changed packages
        run: pnpm --filter="...[origin/main]" --filter="!." --if-present test

  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests (Playwright)
    needs: validate-changed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://tiltcheck.me' }}
