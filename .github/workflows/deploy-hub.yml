name: Deploy Hub to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'apps/hub/**'
      - '.github/workflows/deploy-hub.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Edge Hub Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upsert hub.tiltcheck.me DNS record
        run: |
          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          NAME="hub.tiltcheck.me"
          CONTENT="tiltcheck-edge-hub.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"

          # Check if record already exists
          EXISTING=$(curl -sf "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${NAME}&type=CNAME" \
            -H "Authorization: Bearer ${TOKEN}" | jq -r '.result[0].id // empty')

          if [ -n "$EXISTING" ]; then
            # Update existing record
            curl -sf -X PATCH "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${EXISTING}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"${CONTENT}\",\"proxied\":true}" | jq '.success'
            echo "Updated hub.tiltcheck.me"
          else
            # Create new record
            curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"CNAME\",\"name\":\"hub\",\"content\":\"${CONTENT}\",\"proxied\":true,\"ttl\":1}" | jq '.success'
            echo "Created hub.tiltcheck.me"
          fi
