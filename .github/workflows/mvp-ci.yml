name: MVP CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run knip full report
        run: pnpm knip:report
      - name: Enforce knip CI baseline
        run: pnpm knip:ci

  strict-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages required for typecheck
        run: |
          pnpm -r \
            --filter @tiltcheck/db \
            --filter @tiltcheck/auth \
            --filter @tiltcheck/trust-score-types \
            --filter @tiltcheck/event-types \
            --filter @tiltcheck/trust-engines \
            --filter @tiltcheck/suslink \
            --filter @tiltcheck/lockvault \
            --filter @tiltcheck/event-router \
            --filter @tiltcheck/ai-client \
            --filter @tiltcheck/types \
            --filter @tiltcheck/utils \
            build
      - name: Typecheck API (strict)
        run: pnpm -C apps/api exec tsc --noEmit
      - name: Typecheck LockVault (strict)
        run: pnpm -C modules/lockvault exec tsc --noEmit

  extension-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages required for extension
        run: |
          pnpm -r \
            --filter @tiltcheck/utils \
            build
      - name: Build extension
        run: pnpm -C apps/chrome-extension build
      - name: Run extension unit tests
        run: pnpm -C apps/chrome-extension exec vitest --run tests/unit/message-contracts.test.ts

  vault-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages required for API tests
        run: |
          pnpm -r \
            --filter @tiltcheck/db \
            --filter @tiltcheck/auth \
            --filter @tiltcheck/trust-score-types \
            --filter @tiltcheck/event-types \
            --filter @tiltcheck/trust-engines \
            --filter @tiltcheck/suslink \
            --filter @tiltcheck/lockvault \
            --filter @tiltcheck/event-router \
            --filter @tiltcheck/ai-client \
            --filter @tiltcheck/types \
            --filter @tiltcheck/utils \
            build
      - name: Run vault route tests
        run: pnpm -C apps/api exec vitest --run tests/routes/vault.test.ts
