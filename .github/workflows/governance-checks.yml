name: Governance Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  policy-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required governance files
        run: |
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f docs/governance/OSS-RUNTIME-BOUNDARY.md
          test -f SESSION_LOG.md

      - name: Ensure SESSION_LOG.md is updated
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "SESSION_LOG.md"; then
            echo "::error::SESSION_LOG.md must be updated in every pull request. Please log your session findings/status."
            exit 1
          fi

      - name: Basic secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          if rg -n "(?i)(aws_secret_access_key|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----|xox[baprs]-|AIza[0-9A-Za-z\\-_]{35})" . \
            --glob "!**/.git/**" \
            --glob "!**/node_modules/**"; then
            echo "Potential secrets detected."
            exit 1
          fi
