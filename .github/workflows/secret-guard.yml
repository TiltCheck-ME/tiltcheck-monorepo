name: Secret Scanning

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    name: Guard Secret Leaks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run secret guard on pull requests
        if: github.event_name == 'pull_request'
        run: node scripts/secret-guard.mjs --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

      - name: Run secret guard on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: node scripts/secret-guard.mjs --base "${{ github.event.before }}" --head "${{ github.sha }}"

      - name: Run secret guard on first push
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        run: node scripts/secret-guard.mjs

  gitleaks:
    runs-on: ubuntu-latest
    name: Gitleaks Authoritative Scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks on pull requests
        if: github.event_name == 'pull_request'
        run: >
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          detect
          --source=/repo
          --config=/repo/.gitleaks.toml
          --redact
          --verbose
          --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"

      - name: Run Gitleaks on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: >
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          detect
          --source=/repo
          --config=/repo/.gitleaks.toml
          --redact
          --verbose
          --log-opts="${{ github.event.before }}..${{ github.sha }}"

      - name: Run Gitleaks on first push
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        run: >
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          detect
          --source=/repo
          --config=/repo/.gitleaks.toml
          --redact
          --verbose
