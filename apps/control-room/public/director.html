<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Director's Booth — Live Trivia HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #17c3b2;
      --accent: #d946ef;
      --positive: #00ffaa;
      --danger: #ef4444;
      --warning: #f59e0b;
      --gold: #ffd700;
      --bg: #0a0c10;
      --bg-card: #12161e;
      --border: #283347;
      --text: #ffffff;
      --text-sec: #c4ced8;
      --text-muted: #6b7a8d;
      --font-body: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; padding: 1rem; }

    .topbar { display: flex; align-items: center; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .topbar__brand { font-family: var(--font-display); font-weight: 900; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--primary); }
    .topbar__sub { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .topbar__status { margin-left: auto; font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .status-live { color: var(--positive); }
    .status-idle { color: var(--text-muted); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .card { border: 1px solid var(--border); background: var(--bg-card); padding: 1rem; margin-bottom: 0.75rem; }
    .card--accent { border-color: rgba(23, 195, 178, 0.4); }
    .card--wide { grid-column: 1 / -1; }

    .eyebrow { font-family: var(--font-mono); font-size: 0.55rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
    .title { font-family: var(--font-display); font-weight: 900; font-size: 1rem; text-transform: uppercase; margin-bottom: 0.5rem; }

    label { display: block; font-family: var(--font-mono); font-size: 0.55rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.25rem; }
    input, select { width: 100%; background: #080a0d; border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 0.8rem; padding: 0.5rem; outline: none; margin-bottom: 0.5rem; }
    input:focus, select:focus { border-color: var(--primary); }

    .btn { display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: none; color: var(--text); font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.5rem 0.75rem; cursor: pointer; transition: all 0.15s; }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn--primary { border-color: var(--primary); background: rgba(23, 195, 178, 0.1); color: var(--primary); }
    .btn--danger { border-color: var(--danger); color: var(--danger); }
    .btn--accent { border-color: var(--accent); background: rgba(217, 70, 239, 0.1); color: var(--accent); }
    .btn--gold { border-color: var(--gold); color: var(--gold); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }

    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 0.75rem; }
    .kpi { text-align: center; padding: 0.5rem; border: 1px solid var(--border); background: var(--bg-card); }
    .kpi__val { font-family: var(--font-display); font-weight: 900; font-size: 1.2rem; color: var(--primary); }
    .kpi__label { font-family: var(--font-mono); font-size: 0.45rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.15rem; }

    .player-row { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid var(--border); font-size: 0.7rem; }
    .player-row.eliminated { text-decoration: line-through; color: var(--text-muted); }

    .schedule-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 0.7rem; }
    .schedule-row__time { font-family: var(--font-mono); color: var(--primary); }
    .schedule-row__day { color: var(--text-sec); }
    .schedule-row__next { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); }

    .toast { position: fixed; bottom: 1rem; right: 1rem; background: var(--bg-card); border: 1px solid var(--primary); padding: 0.75rem 1rem; font-family: var(--font-mono); font-size: 0.65rem; color: var(--primary); z-index: 999; display: none; }
    .toast.show { display: block; }

    #log { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); max-height: 120px; overflow-y: auto; white-space: pre-wrap; padding: 0.5rem; border: 1px solid var(--border); background: #080a0d; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar__brand">Director's Booth</span>
  <span class="topbar__sub">Live Trivia HQ</span>
  <span id="game-status" class="topbar__status status-idle">IDLE</span>
</div>

<!-- KPIs -->
<div class="kpi-row">
  <div class="kpi"><p class="kpi__val" id="kpi-round">--</p><p class="kpi__label">Round</p></div>
  <div class="kpi"><p class="kpi__val" id="kpi-alive">--</p><p class="kpi__label">Alive</p></div>
  <div class="kpi"><p class="kpi__val" id="kpi-total">--</p><p class="kpi__label">Total</p></div>
  <div class="kpi"><p class="kpi__val" id="kpi-pool" style="color:var(--gold);">--</p><p class="kpi__label">Prize Pool</p></div>
</div>

<div class="grid">
  <!-- Left: Config + Controls -->
  <div>
    <div class="card card--accent">
      <p class="eyebrow">Game Config</p>
      <label>Topic</label>
      <select id="cfg-topic">
        <option value="casino">Casino</option>
        <option value="crypto">Crypto</option>
        <option value="degen">Degen Culture</option>
        <option value="gambling_math">Gambling Math</option>
        <option value="strategy">Strategy</option>
        <option value="general">General (all)</option>
      </select>
      <label>Rounds</label>
      <input type="number" id="cfg-rounds" value="10" min="1" max="30" />
      <label>Timer (seconds)</label>
      <input type="number" id="cfg-timer" value="20" min="10" max="60" />
      <label>Prize (SOL)</label>
      <input type="number" id="cfg-prize" value="0" min="0" step="0.01" />
      <label>Difficulty</label>
      <select id="cfg-difficulty">
        <option value="mixed">Mixed</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <div class="btn-row">
        <button class="btn btn--primary" onclick="saveConfig()">Save Config</button>
      </div>
    </div>

    <div class="card">
      <p class="eyebrow">Live Controls</p>
      <div class="btn-row">
        <button class="btn btn--primary" onclick="launchGame()">Launch Game</button>
        <button class="btn" onclick="controlAction('pause')">Pause</button>
        <button class="btn" onclick="controlAction('resume')">Resume</button>
        <button class="btn" onclick="controlAction('skip')">Skip</button>
        <button class="btn btn--danger" onclick="controlAction('end')">End Game</button>
      </div>
    </div>

    <div class="card">
      <p class="eyebrow">Push Notifications</p>
      <label>Message</label>
      <input type="text" id="notify-msg" value="Live Trivia HQ game starting now. Get in the Activity." />
      <div class="btn-row">
        <button class="btn btn--accent" onclick="pushNotify()">Push Impromptu Alert</button>
      </div>
    </div>
  </div>

  <!-- Right: Schedule + Players -->
  <div>
    <div class="card card--accent">
      <p class="eyebrow">Schedule</p>
      <div id="schedule-list"></div>
      <div style="margin-top:0.75rem;border-top:1px solid var(--border);padding-top:0.75rem;">
        <p class="eyebrow">Add Recurring Game</p>
        <label>Day</label>
        <select id="sched-day">
          <option value="daily">Daily</option>
          <option value="0">Sunday</option>
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
          <option value="6">Saturday</option>
        </select>
        <label>Time (UTC)</label>
        <div style="display:flex;gap:0.5rem;">
          <input type="number" id="sched-hour" value="20" min="0" max="23" style="flex:1;" />
          <input type="number" id="sched-minute" value="0" min="0" max="59" style="flex:1;" />
        </div>
        <div class="btn-row">
          <button class="btn btn--primary" onclick="addSchedule()">Add Schedule</button>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="eyebrow">Player Monitor</p>
      <div id="player-list"><p style="font-size:0.7rem;color:var(--text-muted);">No active game</p></div>
    </div>

    <div class="card">
      <p class="eyebrow">Activity Log</p>
      <div id="log"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let pollId = null;

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function log(msg) {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString();
  el.textContent = `[${ts}] ${msg}\n` + el.textContent;
  if (el.textContent.length > 5000) el.textContent = el.textContent.slice(0, 5000);
}

async function api(path, method, body) {
  const opts = { method: method || 'GET', headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  try {
    const res = await fetch(API + path, opts);
    return { ok: res.ok, data: await res.json() };
  } catch (err) {
    return { ok: false, data: { error: err.message } };
  }
}

// ── Config ──
async function loadConfig() {
  const { ok, data } = await api('/api/trivia/director/config');
  if (!ok) return;
  document.getElementById('cfg-topic').value = data.topic || 'casino';
  document.getElementById('cfg-rounds').value = data.rounds || 10;
  document.getElementById('cfg-timer').value = data.timerSeconds || 20;
  document.getElementById('cfg-prize').value = data.prizeSol || 0;
  document.getElementById('cfg-difficulty').value = data.difficulty || 'mixed';
}

async function saveConfig() {
  const body = {
    topic: document.getElementById('cfg-topic').value,
    rounds: parseInt(document.getElementById('cfg-rounds').value) || 10,
    timerSeconds: parseInt(document.getElementById('cfg-timer').value) || 20,
    prizeSol: parseFloat(document.getElementById('cfg-prize').value) || 0,
    difficulty: document.getElementById('cfg-difficulty').value,
  };
  const { ok } = await api('/api/trivia/director/config', 'POST', body);
  toast(ok ? 'Config saved' : 'Save failed');
  log(ok ? `Config updated: ${body.topic}, ${body.rounds} rounds` : 'Config save failed');
}

// ── Launch / Control ──
async function launchGame() {
  toast('Launching...');
  log('Launching game...');
  const { ok, data } = await api('/api/trivia/director/launch', 'POST', {});
  toast(ok ? 'Game launched' : 'Launch failed');
  log(ok ? 'Game launched successfully' : `Launch failed: ${data?.error || 'unknown'}`);
  pollStatus();
}

async function controlAction(action) {
  const { ok } = await api('/api/trivia/director/control', 'POST', { action });
  toast(ok ? `${action} sent` : `${action} failed`);
  log(`Control: ${action} — ${ok ? 'OK' : 'FAILED'}`);
  pollStatus();
}

// ── Notify ──
async function pushNotify() {
  const message = document.getElementById('notify-msg').value;
  const { ok } = await api('/api/trivia/director/notify', 'POST', { message });
  toast(ok ? 'Notification pushed' : 'Push failed');
  log(ok ? `Pushed: ${message.slice(0, 60)}` : 'Notification push failed');
}

// ── Status polling ──
async function pollStatus() {
  const { ok, data } = await api('/api/trivia/director/status');
  const statusEl = document.getElementById('game-status');

  if (!ok || !data?.data?.activeGame) {
    statusEl.textContent = 'IDLE';
    statusEl.className = 'topbar__status status-idle';
    document.getElementById('kpi-round').textContent = '--';
    document.getElementById('kpi-alive').textContent = '--';
    document.getElementById('kpi-total').textContent = '--';
    document.getElementById('kpi-pool').textContent = '--';
    document.getElementById('player-list').innerHTML = '<p style="font-size:0.7rem;color:var(--text-muted);">No active game</p>';
    return;
  }

  const g = data.data.activeGame;
  const players = g.players || [];
  const alive = players.filter(p => !p.eliminated).length;

  statusEl.textContent = `ROUND ${g.currentRound || '?'} / ${g.settings?.totalRounds || '?'}`;
  statusEl.className = 'topbar__status status-live';

  document.getElementById('kpi-round').textContent = `${g.currentRound || 0}/${g.settings?.totalRounds || 0}`;
  document.getElementById('kpi-alive').textContent = alive;
  document.getElementById('kpi-total').textContent = players.length;
  document.getElementById('kpi-pool').textContent = g.settings?.prizeSol ? `${g.settings.prizeSol} SOL` : '--';

  const sorted = [...players].sort((a, b) => b.score - a.score);
  document.getElementById('player-list').innerHTML = sorted.length === 0
    ? '<p style="font-size:0.7rem;color:var(--text-muted);">No players yet</p>'
    : sorted.map(p => `
        <div class="player-row ${p.eliminated ? 'eliminated' : ''}">
          <span>${p.username}${p.shieldConsumed ? ' [S]' : ''}${p.buyBackUsed ? ' [BB]' : ''}</span>
          <span style="font-family:var(--font-mono);color:${p.eliminated ? 'var(--text-muted)' : 'var(--primary)'};">${p.score}</span>
        </div>
      `).join('');
}

// ── Schedule ──
async function loadSchedule() {
  const { ok, data } = await api('/api/trivia/director/schedule');
  if (!ok) return;

  const list = document.getElementById('schedule-list');
  const entries = data.entries || [];

  if (entries.length === 0) {
    list.innerHTML = '<p style="font-size:0.7rem;color:var(--text-muted);">No scheduled games</p>';
    return;
  }

  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  list.innerHTML = entries.map(e => {
    const dayLabel = e.dayOfWeek === 'daily' ? 'Daily' : dayNames[Number(e.dayOfWeek)] || e.dayOfWeek;
    const time = `${String(e.hour).padStart(2, '0')}:${String(e.minute).padStart(2, '0')} UTC`;
    const next = e.nextRun ? new Date(e.nextRun).toLocaleString() : '--';
    return `
      <div class="schedule-row">
        <div>
          <span class="schedule-row__day">${dayLabel}</span>
          <span class="schedule-row__time">${time}</span>
          <span style="font-size:0.55rem;color:${e.enabled ? 'var(--positive)' : 'var(--danger)'};">${e.enabled ? 'ON' : 'OFF'}</span>
        </div>
        <div style="display:flex;gap:0.25rem;align-items:center;">
          <span class="schedule-row__next">Next: ${next}</span>
          <button class="btn" style="font-size:0.5rem;padding:0.25rem 0.4rem;" onclick="toggleSchedule('${e.id}', ${!e.enabled})">${e.enabled ? 'Disable' : 'Enable'}</button>
          <button class="btn btn--danger" style="font-size:0.5rem;padding:0.25rem 0.4rem;" onclick="deleteSchedule('${e.id}')">X</button>
        </div>
      </div>
    `;
  }).join('');
}

async function addSchedule() {
  const body = {
    dayOfWeek: document.getElementById('sched-day').value,
    hour: parseInt(document.getElementById('sched-hour').value) || 20,
    minute: parseInt(document.getElementById('sched-minute').value) || 0,
  };
  const { ok } = await api('/api/trivia/director/schedule', 'POST', body);
  toast(ok ? 'Schedule added' : 'Failed');
  log(ok ? `Scheduled: ${body.dayOfWeek} at ${body.hour}:${String(body.minute).padStart(2, '0')} UTC` : 'Schedule add failed');
  loadSchedule();
}

async function toggleSchedule(id, enabled) {
  await api(`/api/trivia/director/schedule/${id}`, 'PATCH', { enabled });
  loadSchedule();
}

async function deleteSchedule(id) {
  await api(`/api/trivia/director/schedule/${id}`, 'DELETE');
  toast('Schedule removed');
  loadSchedule();
}

// ── Boot ──
loadConfig();
loadSchedule();
pollStatus();
pollId = setInterval(pollStatus, 5000);
</script>

</body>
</html>
