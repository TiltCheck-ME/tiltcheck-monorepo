#:schema https://pnpm.io/json-schema/package.json
#:schema https://raw.githubusercontent.com/cloudflare/wrangler2/main/packages/wrangler/src/config-schema.json
name = "tiltcheck-hub"
main = "src/index.ts"
compatibility_date = "2024-03-01"

[vars]
ENVIRONMENT = "staging"

[[kv_namespaces]]
binding = "SESSIONS"
id = "ab6a5560948348a6b261ac6f8ebe8592"

[[d1_databases]]
binding = "DB"
database_name = "tiltcheck-identity"
