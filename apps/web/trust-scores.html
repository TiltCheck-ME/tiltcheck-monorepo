<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rug Scores - TiltCheck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/main.css">
  <style>
    /* Terminal UI / Degen Intel Aesthetic */
    .rug-hero {
      padding: 6rem 0 3rem;
      text-align: center;
      background: #000;
      border-bottom: 1px solid #333;
    }
    .rug-hero h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .rug-hero p {
      font-family: 'JetBrains Mono', monospace;
      color: #777;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
    }

    .terminal-container {
      max-width: 1000px;
      margin: 3rem auto 6rem;
      background: #050508;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .terminal-top-bar {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 10px 15px;
      display: flex;
      gap: 8px;
    }
    .term-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .term-dot.r { background: #ff5f56; }
    .term-dot.y { background: #ffbd2e; }
    .term-dot.g { background: #27c93f; }

    .trust-table-wrapper { overflow-x: auto; padding: 2rem; }
    .trust-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }
    .trust-table th {
      text-align: left;
      color: #555;
      padding-bottom: 1rem;
      border-bottom: 1px dashed #333;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .trust-table td {
      padding: 1rem 0;
      color: #ccc;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .trust-table tr:hover td { background: rgba(255,255,255,0.01); }

    .casino-tag { color: #fff; font-weight: 700; font-size: 0.9rem; }
    .score-txt { font-weight: 900; font-size: 1.1rem; }
    
    .status-safe { color: var(--primary-mint); border: 1px solid var(--primary-mint); padding: 2px 6px; font-size: 0.7rem; border-radius: 4px; }
    .status-warning { color: #ffbd2e; border: 1px solid #ffbd2e; padding: 2px 6px; font-size: 0.7rem; border-radius: 4px; }
    .status-shadow { color: #ff5f56; border: 1px solid #ff5f56; padding: 2px 6px; font-size: 0.7rem; border-radius: 4px; background: rgba(255,95,86,0.1); }
    
    .metric-data { color: #888; font-size: 0.75rem; }
  </style>
</head>
<body class="degen-background text-white">
  <div id="shared-nav"></div>

  <header class="rug-hero">
    <h1>RUG SCORES</h1>
    <p>// VERIFY THE APES: LIVE ON-CHAIN INTELLIGENCE //</p>
  </header>

  <main class="container">
    <div class="terminal-container">
      <div class="terminal-top-bar">
        <div class="term-dot r"></div><div class="term-dot y"></div><div class="term-dot g"></div>
      </div>
      <div class="trust-table-wrapper">
        <table class="trust-table">
          <thead>
            <tr>
              <th>Target House</th>
              <th>Rug Score</th>
              <th>Status</th>
              <th>Intel Signal</th>
            </tr>
          </thead>
          <tbody id="rug-table-body">
            <!-- Populated via script -->
            <tr><td colspan="4" style="text-align:center; padding: 2rem;">Connecting to the grid...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="shared-footer"></div>
  <script src="/scripts/components-loader.js"></script>
  <script>
    // Overriding the script format to match the new Degen vibe
    document.addEventListener("DOMContentLoaded", () => {
      fetch('/data/trust-rollups.json')
        .then(r => r.json())
        .then(data => {
          const body = document.getElementById('rug-table-body');
          const batches = data.batches || [];
          const latestBatch = batches[batches.length - 1];

          if (!latestBatch?.casino?.casinos || Object.keys(latestBatch.casino.casinos).length === 0) {
            body.innerHTML = `<tr><td colspan="4">No intel found on the grid.</td></tr>`;
            return;
          }

          let rows = '';
          for (const [name, info] of Object.entries(latestBatch.casino.casinos)) {
            const scoreNum = parseFloat(info.lastScore);
            let scoreStr = info.lastScore ?? 'N/A';
            
            let statusBadge = '<span class="status-warning">UNKNOWN</span>';
            let intelMsg = info.events ?? 'Standard operations.';

            if (!isNaN(scoreNum)) {
                if (scoreNum >= 80) {
                    statusBadge = '<span class="status-safe">SAFE HAVEN</span>';
                    intelMsg = 'Seed verified. Withdrawals processing normally.';
                } else if (scoreNum >= 50) {
                    statusBadge = '<span class="status-warning">CAUTION</span>';
                    intelMsg = 'Slower withdrawals reported. Proceed with caution.';
                } else {
                    statusBadge = '<span class="status-shadow">SHADOW-HOUSE</span>';
                    intelMsg = 'HIGH RISK: Seed tampering probability detected.';
                }
            }

            rows += `
              <tr>
                <td class="casino-tag">> ${name}</td>
                <td class="score-txt">${scoreStr}</td>
                <td>${statusBadge}</td>
                <td class="metric-data">${intelMsg}</td>
              </tr>
            `;
          }
          body.innerHTML = rows;
        }).catch(() => {
          document.getElementById('rug-table-body').innerHTML = `<tr><td colspan="4">Signal lost. Intel server offline.</td></tr>`;
        });
    });
  </script>
</body>
</html>
