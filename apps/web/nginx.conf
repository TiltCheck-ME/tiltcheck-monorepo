server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # For static assets (images, css, js), apply aggressive caching.
    # The regex matches common asset file extensions.
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff|woff2|ttf|eot)$ {
        # This tells browsers and CDNs to cache the file for one year and that it will not change.
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # For all other requests (like HTML pages), ensure the browser always checks for a new version.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
