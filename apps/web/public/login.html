<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - TiltCheck</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles/theme.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .login-page {
        width: 100%;
        max-width: 450px;
        padding: 2rem;
      }
      .login-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 2.5rem;
        text-align: center;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.2);
      }
      .login-card h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.75rem;
      }
      .login-card .logo {
        color: var(--color-primary);
        font-weight: 800;
        font-size: 2rem;
        letter-spacing: 0.5px;
        margin-bottom: 1rem;
      }
      .login-card p {
        color: var(--text-secondary);
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .discord-login-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.8rem 1rem;
        font-weight: 600;
        font-size: 1rem;
      }
      .legal-text {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      }
      .legal-text a {
        color: var(--text-secondary);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="login-page">
      <div class="login-card">
        <div class="logo">TiltCheck</div>
        <h1>Sign in to Your Account</h1>
        <p>Connect your Discord to access your dashboard and unlock all features.</p>
        <button class="btn btn-primary discord-login-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="margin-right: 8px;">
            <path d="M20.317 4.36981C18.276 3.42981 16.121 3.00081 13.894 3.00081C11.667 3.00081 9.51201 3.42981 7.47101 4.36981C5.43001 5.30981 3.784 6.68081 2.694 8.33881C1.604 9.99681 1.006 11.8858 1.006 13.8468C1.006 16.8088 2.299 19.4418 4.492 21.1178C6.685 22.7938 9.41201 23.6448 12.301 23.6448C15.19 23.6448 17.917 22.7938 20.11 21.1178C22.303 19.4418 23.596 16.8088 23.596 13.8468C23.596 11.8858 23.009 9.99681 21.928 8.33881C20.838 6.68081 19.182 5.30981 17.141 4.36981L20.317 4.36981ZM8.65801 18.2728C7.65301 18.2728 6.83801 17.5348 6.83801 16.6348C6.83801 15.7338 7.64201 15.0068 8.65801 15.0068C9.67401 15.0068 10.48 15.7338 10.48 16.6348C10.48 17.5348 9.67401 18.2728 8.65801 18.2728ZM15.342 18.2728C14.337 18.2728 13.522 17.5348 13.522 16.6348C13.522 15.7338 14.326 15.0068 15.342 15.0068C16.358 15.0068 17.164 15.7338 17.164 16.6348C17.164 17.5348 16.358 18.2728 15.342 18.2728Z"/>
          </svg>
          <span>Sign in with Discord</span>
        </button>
        <p class="legal-text">By signing in, you agree to our <a href="/terms.html">Terms of Service</a> and <a href="/privacy.html">Privacy Policy</a>.</p>
      </div>
    </main>
    <script src="/scripts/auth.js"></script>
  </body>
</html>
