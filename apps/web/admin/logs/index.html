<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Logs - TiltCheck</title>
  <meta name="description" content="Human-friendly admin logs view for TiltCheck operations.">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/main.css">
  <script src="/scripts/glitter.js" defer></script>
  <style>
    .logs-shell { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
    .logs-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 1rem; }
    .logs-toolbar { display: flex; gap: .75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .logs-output { background: #000; color: #a8f7a8; border: 1px solid #2a2f34; border-radius: 8px; padding: .75rem; max-height: 65vh; overflow: auto; font-family: ui-monospace, monospace; font-size: .82rem; }
    .logs-muted { color: #8b949e; font-size: .9rem; }
    .logs-output table { width: 100%; border-collapse: collapse; }
    .logs-output th, .logs-output td { padding: .35rem .45rem; border-bottom: 1px solid #1f2733; text-align: left; vertical-align: top; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="shared-nav"></div>

  <main id="main-content" class="logs-shell">
    <h1>Admin Logs</h1>
    <p class="logs-muted">Operational log surface for quick diagnostics. Uses API endpoints when available and falls back gracefully.</p>

    <section class="logs-panel">
      <div class="logs-toolbar">
        <button class="btn btn-secondary" id="refresh-btn" type="button">Refresh</button>
        <label for="tail">Tail</label>
        <select id="tail">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="250">250</option>
        </select>
        <span id="status" class="logs-muted">Idle</span>
      </div>
      <div id="output" class="logs-output" aria-live="polite">No logs loaded yet.</div>
    </section>
  </main>

  <div id="shared-footer"></div>
  <script>
    const output = document.getElementById('output');
    const statusEl = document.getElementById('status');
    const tailEl = document.getElementById('tail');
    const refreshBtn = document.getElementById('refresh-btn');

    function setStatus(text) { statusEl.textContent = text; }

    function createCell(value) {
      const cell = document.createElement('td');
      cell.textContent = value;
      return cell;
    }

    function renderRows(logs) {
      if (!Array.isArray(logs) || !logs.length) {
        output.textContent = 'No log records returned.';
        return;
      }

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Time', 'Method', 'Path', 'IP', 'User-Agent'].forEach((label) => {
        const th = document.createElement('th');
        th.textContent = label;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);

      const tbody = document.createElement('tbody');
      logs.forEach((log) => {
        const row = document.createElement('tr');
        const ts = log?.ts ? new Date(log.ts).toLocaleString() : '-';
        const method = typeof log?.method === 'string' ? log.method : '-';
        const path = typeof log?.path === 'string' ? log.path : '-';
        const ip = typeof log?.ip === 'string' ? log.ip : '-';
        const ua = typeof log?.ua === 'string' ? log.ua.slice(0, 120) : '-';

        row.appendChild(createCell(ts));
        row.appendChild(createCell(method));
        row.appendChild(createCell(path));
        row.appendChild(createCell(ip));
        row.appendChild(createCell(ua));
        tbody.appendChild(row);
      });

      table.appendChild(thead);
      table.appendChild(tbody);
      output.replaceChildren(table);
    }

    async function refreshLogs() {
      setStatus('Loading...');
      output.textContent = 'Loading logs...';
      const tail = encodeURIComponent(tailEl.value || '50');
      const key = encodeURIComponent(new URLSearchParams(window.location.search).get('key') || '');
      const candidates = [
        `/api/admin/logs?tail=${tail}${key ? `&key=${key}` : ''}`,
        `/admin/logs?tail=${tail}${key ? `&key=${key}` : ''}`
      ];
      for (const url of candidates) {
        try {
          const res = await fetch(url, { credentials: 'include' });
          if (!res.ok) continue;
          const data = await res.json();
          renderRows(data.logs || data.items || []);
          setStatus(`Loaded from ${url}`);
          return;
        } catch (_) {}
      }
      output.textContent = 'Logs API is unavailable in this environment. Check service routing or auth key settings.';
      setStatus('Unavailable');
    }

    refreshBtn.addEventListener('click', refreshLogs);
    refreshLogs();
  </script>
  <script src="/scripts/components-loader.js"></script>
  <script src="/scripts/auth.js"></script>
</body>
</html>
