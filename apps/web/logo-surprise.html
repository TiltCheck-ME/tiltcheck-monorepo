<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiltCheck Neural-Audit Logo Surprise</title>
    <style>
        :root {
            --primary-mint: #22d3a6;
            --dark-obsidian: #0e0e0f;
            --emerald-glow: rgba(34, 211, 166, 0.4);
        }

        body {
            background-color: var(--dark-obsidian);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.05);
        }

        /* The SVG Neuro-Shield */
        .neuro-shield {
            width: 250px;
            height: 250px;
            filter: drop-shadow(0 0 15px var(--emerald-glow));
        }

        /* Animated Circuit Lines */
        .circuit-path {
            fill: none;
            stroke: var(--primary-mint);
            stroke-width: 1.5;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: drawCircuit 4s infinite alternate ease-in-out;
        }

        @keyframes drawCircuit {
            0% { stroke-dashoffset: 400; opacity: 0.3; }
            50% { stroke-dashoffset: 0; opacity: 1; }
            100% { stroke-dashoffset: -400; opacity: 0.3; }
        }

        /* The Glitchy TILT-CHECK text */
        .brand-name {
            margin-top: -40px;
            color: white;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .brand-name span {
            color: var(--primary-mint);
            text-shadow: 0 0 10px var(--emerald-glow);
        }

        /* Background Glitch Effect */
        .logo-container:hover .brand-name {
            animation: textGlitch 0.2s infinite;
        }

        @keyframes textGlitch {
            0% { transform: translate(0); text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff; }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Scanning Bar */
        .scan-line {
            width: 300px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-mint), transparent);
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            opacity: 0.5;
            animation: scanner 3s infinite linear;
            pointer-events: none;
        }

        @keyframes scanner {
            0% { top: 10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="scan-line"></div>
        
        <svg class="neuro-shield" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer Shield Ring -->
            <path class="circuit-path" d="M100 20 L160 50 L160 120 C160 160 100 180 100 180 C100 180 40 160 40 120 L40 50 L100 20" />
            
            <!-- Secondary Technical Frame -->
            <rect x="70" y="70" width="60" height="60" rx="4" class="circuit-path" style="animation-duration: 6s;" />
            
            <!-- The Central Pulse Mark -->
            <path d="M85 100 L95 110 L115 90" fill="none" stroke="var(--primary-mint)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" style="filter: blur(0.5px); opacity: 0.9; animation: pulse 2s infinite alternate;" />
        </svg>

        <div class="brand-name">TILT<span>CHECK</span></div>
    </div>

    <style>
        @keyframes pulse {
            from { opacity: 0.5; filter: drop-shadow(0 0 5px var(--primary-mint)); }
            to { opacity: 1; filter: drop-shadow(0 0 20px var(--primary-mint)); }
        }
    </style>
</body>
</html>
