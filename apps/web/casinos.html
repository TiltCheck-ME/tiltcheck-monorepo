<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casinos - TiltCheck Transparency Layer</title>
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/main.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .score-pill {
      border-radius: 999px;
      padding: 0.25rem 0.6rem;
      font-size: 0.8rem;
      border: 1px solid #46658b;
      color: #c5dcff;
      white-space: nowrap;
    }
    .risk-pill {
      border-radius: 999px;
      padding: 0.22rem 0.5rem;
      font-size: 0.75rem;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .risk-low { color: #9ae7cb; border-color: #2a7b62; background: rgba(42,123,98,0.2); }
    .risk-medium { color: #ffd28c; border-color: #8f6b27; background: rgba(143,107,39,0.2); }
    .risk-high { color: #ffafba; border-color: #8b3046; background: rgba(139,48,70,0.2); }
    .casino-item {
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.2s;
    }
    .casino-item:hover { background: rgba(255,255,255,0.02); }
    .casino-item[aria-selected="true"] { background: rgba(0,255,170,0.05); border-left: 3px solid #00ffaa; }
  </style>
<link rel="stylesheet" href="/styles/main.css">
  <script src="/scripts/glitter.js" defer></script>
<link rel="stylesheet" href="/styles/main.css">
  <script src="/scripts/glitter.js" defer></script>
</head>
<body class="bg-[#0E0E0F] text-white">
  <div id="shared-nav"></div>

  <main id="casinos-main" class="container mx-auto py-32 px-6">
    <header class="mb-12">
      <h1 class="text-4xl md:text-6xl font-black mb-4 uppercase">Casino Intelligence</h1>
      <p class="text-xl text-gray-400">Browse trust scores, risk context, and fairness signals for 191+ indexed casinos.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Filter Sidebar -->
      <aside class="lg:col-span-1 glass-card p-8 h-fit sticky top-32">
        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Search</label>
            <input id="search-input" type="search" placeholder="Name, category..." class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-[#00ffaa] outline-none">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Risk Level</label>
            <select id="risk-filter" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-[#00ffaa] outline-none">
              <option value="">All Risks</option>
              <option value="low">Low Risk</option>
              <option value="medium">Medium Risk</option>
              <option value="high">High Risk</option>
            </select>
          </div>
          <div id="meta" class="text-xs text-gray-500 mt-8">Loading intelligence data...</div>
        </div>
      </aside>

      <!-- Casino List -->
      <section class="lg:col-span-2 space-y-4">
        <div id="casino-list" class="glass-card overflow-hidden">
          <!-- Items injected via JS -->
        </div>
      </section>
    </div>
  </main>

  <div id="shared-footer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    (function () {
      const dom = {
        meta: document.getElementById('meta'),
        search: document.getElementById('search-input'),
        risk: document.getElementById('risk-filter'),
        list: document.getElementById('casino-list'),
      };

      let allCasinos = [];

      async function loadData() {
        try {
          const response = await fetch('/data/online-casinos.json');
          allCasinos = await response.json();
          render(allCasinos);
          dom.meta.textContent = Total Index:  Casinos;
        } catch (err) {
          dom.list.innerHTML = '<div class="p-8 text-red-400">Failed to load casino data.</div>';
        }
      }

      function render(data) {
        dom.list.innerHTML = data.map(item => 
          <div class="casino-item group">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="text-lg font-bold group-hover:text-[#00ffaa] transition-colors uppercase"></h3>
                <div class="flex gap-2 mt-1">
                  <span class="text-xs text-gray-500 font-mono"></span>
                  <span class="risk-pill risk-"></span>
                </div>
              </div>
              <div class="text-right">
                <div class="text-xl font-black text-[#00ffaa]"></div>
                <div class="text-[10px] text-gray-500 uppercase tracking-tighter">Trust Score</div>
              </div>
            </div>
          </div>
        ).join('');
      }

      dom.search.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const filtered = allCasinos.filter(c => c.name.toLowerCase().includes(q));
        render(filtered);
      });

      dom.risk.addEventListener('change', (e) => {
        const r = e.target.value.toLowerCase();
        const filtered = allCasinos.filter(c => !r || (c.risk || '').toLowerCase().includes(r));
        render(filtered);
      });

      loadData();
    })();
  </script>
  <script src="/scripts/components-loader.js"></script>
  <script src="/scripts/auth.js"></script>
</body>
</html>
