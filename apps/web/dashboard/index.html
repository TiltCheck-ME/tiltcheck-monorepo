<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Access - TiltCheck</title>
  <meta name="description" content="TiltCheck account hub access requires Discord login.">
  <meta name="robots" content="noindex,follow">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    .card {
      width: 100%;
      max-width: 560px;
      border: 1px solid #30363d;
      border-radius: 14px;
      background: #161b22;
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px;
      color: #00d4aa;
      font-size: 1.4rem;
    }
    p {
      margin: 0 0 10px;
      line-height: 1.6;
      color: #9fb3c8;
    }
    a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      font-weight: 700;
      color: #0d1117;
      background: #00d4aa;
      border-radius: 8px;
      padding: 10px 14px;
    }
  </style>
<link rel="stylesheet" href="/styles/main.css">
  <script type="module" src="/scripts/glitter.js" defer></script>
</head>
<body>
  <main class="card">
    <h1>Dashboard requires Discord login</h1>
    <p>Checking your session now.</p>
    <p>If you are not authenticated, you will be redirected to the login flow.</p>
    <a href="https://dashboard.tiltcheck.me/login">Login with Discord</a>
  </main>
  <script type="module">
    (async () => {
      const next = 'https://dashboard.tiltcheck.me';
      const endpoints = ['/api/auth/me', '/auth/me', '/play/api/user', '/api/user'];

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, { credentials: 'include' });
          if (response.ok) {
            window.location.replace(next);
            return;
          }
        } catch (_) {
          // Try the next endpoint.
        }
      }

      window.location.replace('https://dashboard.tiltcheck.me/login');
    })();
  </script>
</body>
</html>
