<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TiltCheck</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 280px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #101420;
      color: #eef2ff;
      padding: 14px;
    }
    .card {
      background: #171e2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    h1 { font-size: 16px; margin-bottom: 4px; }
    .sub { font-size: 11px; opacity: 0.75; line-height: 1.35; }
    .status { font-size: 12px; }
    .status strong { color: #86efac; }
    .status.warn strong { color: #fbbf24; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn.primary { background: #6366f1; color: #fff; }
    .btn.secondary { background: #2a3347; color: #eef2ff; }
    .btn.discord { background: #5865f2; color: #fff; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TiltCheck Launcher</h1>
    <p class="sub">Popup handles quick actions. The in-page sidebar is the full control center.</p>
  </div>

  <div class="card">
    <div class="status" id="sidebarStatus">Sidebar: <strong>checking...</strong></div>
    <button class="btn primary" id="toggleSidebarBtn">Toggle In-Page Sidebar</button>
  </div>

  <div class="card">
    <div class="status warn" id="authStatus">Account: <strong>not connected</strong></div>
    <button class="btn discord" id="loginBtn">Connect Discord</button>
    <div class="grid">
      <button class="btn secondary" id="vaultBtn">Open Web Vault</button>
      <button class="btn secondary" id="dashboardBtn">Open Dashboard</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
