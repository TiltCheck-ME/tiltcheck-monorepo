<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TiltCheck Discord Connect</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(520px, calc(100vw - 32px));
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }
      p {
        margin: 0 0 14px;
        opacity: 0.9;
        line-height: 1.45;
      }
      .status {
        margin-top: 8px;
        font-size: 13px;
        opacity: 0.85;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      #open-btn {
        background: #6366f1;
        color: white;
      }
      #close-btn {
        background: rgba(255, 255, 255, 0.14);
        color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>TiltCheck Discord Connect</h1>
      <p>Opening Discord authentication. Keep this tab open until sign-in completes.</p>
      <p class="status" id="status">Launching secure auth popup...</p>
      <div class="actions">
        <button id="open-btn" type="button">Open Discord Auth</button>
        <button id="close-btn" type="button">Close</button>
      </div>
    </main>
    <script src="./auth-bridge.js"></script>
  </body>
</html>
