services:
  discord-bot:
    build:
      context: .
      dockerfile: apps/discord-bot/Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    env_file: .env
    environment:
      - SKIP_ENV_VALIDATION=1
      - PORT=8081
      - DISCORD_BOT_HEALTH_PORT=8081
    networks:
      - tiltcheck-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: api
    ports:
      - "3001:3001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    env_file: .env
    environment:
      - SKIP_ENV_VALIDATION=1
      - PORT=3001
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tiltcheck-network

  control-room:
    build:
      context: .
      dockerfile: apps/control-room/Dockerfile
    container_name: control-room
    ports:
      - "3002:3001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    env_file: .env
    environment:
      - SKIP_ENV_VALIDATION=1
      - PORT=3001
    networks:
      - tiltcheck-network

  landing:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: landing
    ports:
      - "8080:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:80/status.html || exit 0" ]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - tiltcheck-network

  trust-rollup:
    build:
      context: .
      dockerfile: apps/trust-rollup/Dockerfile
    container_name: trust-rollup
    ports:
      - "8082:8082"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    env_file: .env
    environment:
      - SKIP_ENV_VALIDATION=1
      - PORT=8082
    networks:
      - tiltcheck-network

  user-dashboard:
    build:
      context: .
      dockerfile: apps/user-dashboard/Dockerfile
    container_name: user-dashboard
    ports:
      - "6001:6001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    env_file: .env
    environment:
      - SKIP_ENV_VALIDATION=1
      - PORT=6001
    networks:
      - tiltcheck-network

  game-arena:
    build:
      context: .
      dockerfile: apps/game-arena/Dockerfile
    container_name: game-arena
    ports:
      - "7071:3010"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    env_file: .env
    environment:
      - SKIP_ENV_VALIDATION=1
      - PORT=3010
    networks:
      - tiltcheck-network

networks:
  tiltcheck-network:
    driver: bridge
