services:
  discord-bot:
    build:
      context: .
      dockerfile: apps/discord-bot/Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=8081
    volumes:
      - discord-bot-data:/tmp
    networks:
      - tiltcheck-network
    develop:
      watch:
        - path: ./apps/discord-bot/src
          action: rebuild
        - path: ./packages
          action: rebuild
        - path: ./modules
          action: rebuild

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "3001:3001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=3001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error()})"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    volumes:
      - api-data:/tmp
    networks:
      - tiltcheck-network
    depends_on:
      - discord-bot
    develop:
      watch:
        - path: ./apps/api/src
          action: rebuild
        - path: ./packages
          action: rebuild
        - path: ./modules
          action: rebuild

  control-room:
    build:
      context: .
      dockerfile: apps/control-room/Dockerfile
    container_name: control-room
    ports:
      - "3002:3001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=3001
    volumes:
      - control-room-data:/tmp
    networks:
      - tiltcheck-network
    depends_on:
      - api
    develop:
      watch:
        - path: ./apps/control-room/src
          action: rebuild
        - path: ./packages
          action: rebuild
        - path: ./modules
          action: rebuild

  landing:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: landing
    ports:
      - "80:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/status.html || exit 0"]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - tiltcheck-network
    develop:
      watch:
        - path: ./apps/web/src
          action: rebuild
        - path: ./packages
          action: rebuild

  trust-rollup:
    build:
      context: .
      dockerfile: apps/trust-rollup/Dockerfile
    container_name: trust-rollup
    ports:
      - "8082:8082"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=8082
    volumes:
      - trust-rollup-data:/tmp
    networks:
      - tiltcheck-network
    depends_on:
      - api
    develop:
      watch:
        - path: ./apps/trust-rollup/src
          action: rebuild
        - path: ./packages
          action: rebuild
        - path: ./modules
          action: rebuild

  user-dashboard:
    build:
      context: .
      dockerfile: apps/user-dashboard/Dockerfile
    container_name: user-dashboard
    ports:
      - "6001:6001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=6001
    volumes:
      - user-dashboard-data:/tmp
    networks:
      - tiltcheck-network
    depends_on:
      - api
    develop:
      watch:
        - path: ./apps/user-dashboard/src
          action: rebuild
        - path: ./packages
          action: rebuild
        - path: ./modules
          action: rebuild

  game-arena:
    build:
      context: .
      dockerfile: apps/game-arena/Dockerfile
    container_name: game-arena
    ports:
      - "7071:3010"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=3010
    volumes:
      - game-arena-data:/tmp
    networks:
      - tiltcheck-network
    depends_on:
      - api
    develop:
      watch:
        - path: ./apps/game-arena/src
          action: rebuild
        - path: ./packages
          action: rebuild
        - path: ./modules
          action: rebuild

networks:
  tiltcheck-network:
    driver: bridge

volumes:
  api-data:
  control-room-data:
  discord-bot-data:
  trust-rollup-data:
  user-dashboard-data:
  game-arena-data:
