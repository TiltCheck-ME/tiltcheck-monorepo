version: '3.8'
services:
  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./apps/game-arena
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
    ports:
      - "3000:3000"
    depends_on:
      - redis

  k6:
    image: grafana/k6:latest
    volumes:
      - ./apps/game-arena/tests:/scripts:ro
    entrypoint: ["k6","run","/scripts/load_test.js"]
    depends_on:
      - api

volumes:
  redis-data: {}
