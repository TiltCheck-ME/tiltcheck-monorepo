title = "TiltCheck Gitleaks Overrides"

[extend]
useDefault = true

[[allowlists]]
description = "Allow placeholder values in environment example files"
condition = "AND"
paths = [
  '''(?:^|/)\.env(?:\.[A-Za-z0-9_-]+)?\.example$''',
]
regexTarget = "line"
regexes = [
  '''(?i)(?:[A-Z0-9_]+)\s*=\s*['"]?(?:ROTATE_THIS_IMMEDIATELY(?:_[A-Z0-9_]+)?|REPLACE_ME(?:_WITH_[A-Z0-9_]+)?|your-[a-z0-9-]+(?:-here)?|<[^>]+>)['"]?''',
]

[[allowlists]]
description = "Allow planning task keys in Linear export docs"
condition = "AND"
paths = [
  '''^docs/ops/linear-tasks(?:-mvp-cloud-run)?\.json$''',
]
regexTarget = "line"
regexes = [
  '''"key":\s*"[A-Z0-9]+(?:-[A-Z0-9]+)+"''',
]
