---
# tiltcheck-api
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tiltcheck-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '20'
        run.googleapis.com/cloudsql-instances: tiltcheck:us-central1:tiltcheck-main
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: 164294266634-compute@developer.gserviceaccount.com
      containers:
      - image: us-central1-docker.pkg.dev/tiltcheck/tiltcheck/api:latest
        ports:
        - name: http1
          containerPort: 3001
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        env:
        - name: NODE_ENV
          value: production
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef: { name: JWT_SECRET, key: latest }
        - name: VAULT_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef: { name: VAULT_ENCRYPTION_KEY, key: latest }
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef: { name: GEMINI_API_KEY, key: latest }
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef: { name: SUPABASE_URL, key: latest }
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef: { name: SUPABASE_SERVICE_ROLE_KEY, key: latest }
        - name: NEON_DATABASE_URL
          valueFrom:
            secretKeyRef: { name: NEON_DATABASE_URL, key: latest }
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef: { name: TILT_DISCORD_CLIENT_ID, key: latest }
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef: { name: TILT_DISCORD_CLIENT_SECRET, key: latest }
        - name: DISCORD_REDIRECT_URI
          value: https://api.tiltcheck.me/auth/discord/callback
        startupProbe:
          timeoutSeconds: 240
          periodSeconds: 240
          failureThreshold: 1
          tcpSocket: { port: 3001 }

