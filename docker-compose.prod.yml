services:
  discord-bot:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s

  api:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 15s

  control-room:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  landing:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      interval: 120s
      timeout: 10s
      retries: 5
      start_period: 30s

  trust-rollup:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  user-dashboard:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  game-arena:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
