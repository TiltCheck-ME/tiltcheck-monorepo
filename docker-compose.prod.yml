# Production compose override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Services defined only here (no base entry) are fully specified below.

services:
  discord-bot:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s

  api:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 15s

  control-room:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  landing:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      interval: 120s
      timeout: 10s
      retries: 5
      start_period: 30s

  trust-rollup:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  user-dashboard:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  game-arena:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # activity: nginx static SPA (Discord Activity HUD host) — fully defined here (not in base compose)
  activity:
    build:
      context: .
      dockerfile: apps/activity/Dockerfile
    container_name: activity
    restart: always
    ports:
      - "3003:8080"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    env_file: .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tiltcheck-network

  # justthetip-bot: tip-tracking Discord bot — fully defined here (not in base compose)
  justthetip-bot:
    build:
      context: .
      dockerfile: apps/justthetip-bot/Dockerfile
    container_name: justthetip-bot
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:8080/health',(r)=>{process.exit(r.statusCode===200?0:1);}).on('error',()=>process.exit(1));\""]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - tiltcheck-network

  # dad-bot: degen advice Discord bot — fully defined here (not in base compose)
  dad-bot:
    build:
      context: .
      dockerfile: apps/dad-bot/Dockerfile
    container_name: dad-bot
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file: .env
    environment:
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
      - PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:8080/health',(r)=>{process.exit(r.statusCode===200?0:1);}).on('error',()=>process.exit(1));\""]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - tiltcheck-network

  # cloudflared: Cloudflare tunnel daemon — routes *.tiltcheck.me to internal services
  # TUNNEL_TOKEN must be set in .env or injected via CI — never hardcode it
  cloudflared:
    build:
      context: .
      dockerfile: apps/cloudflared/Dockerfile
    container_name: cloudflared
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "cloudflared version > /dev/null 2>&1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - tiltcheck-network

networks:
  tiltcheck-network:
    driver: bridge
