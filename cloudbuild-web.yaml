steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/tiltcheck/tiltcheck-services/web:latest', '-f', 'apps/web/Dockerfile', '.']
images:
- 'us-central1-docker.pkg.dev/tiltcheck/tiltcheck-services/web:latest'
options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

